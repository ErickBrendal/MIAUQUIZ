<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MIAUQUIZ - O Desafio Felino</title>
    <meta name="description" content="MIAUQUIZ - O Desafio Felino. Teste seus conhecimentos sobre o universo dos gatos no quiz mais divertido para amantes de felinos." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#7C3AED" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function (e) {
            console.warn('SW registration failed:', e);
          });
        });
      }
      // Carrega o card de instalação do PWA
      window.addEventListener('load', function () {
        var s = document.createElement('script');
        s.src = '/install-prompt.js';
        s.defer = true;
        document.body.appendChild(s);
      });
    </script>
  </body>
</html>
